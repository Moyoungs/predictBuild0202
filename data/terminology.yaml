# ================================================================
# 교량 수량집계표 용어 사전 (Terminology Dictionary)
# ================================================================
# 용도: 여러 수량산출서의 이질적 표기를 총괄집계표 표준 용어로 매핑
# 근거: 갈전7교 프로젝트 (01~05 입력 + 00 출력) 실제 데이터 분석
# 구조:
#   - units: 단위 정규화
#   - categories: 총괄집계표 대분류(토공/구조물공/가시설/지반개량/가축도)
#   - work_types: 공종 상세 매핑
#   - rebar_specs: 철근 규격 정규화
#   - concrete_specs: 콘크리트 규격 정규화
#   - structures: 구조물 구분 매핑
# ================================================================

metadata:
  version: "0.1.0"
  created_from: "갈전7교 프로젝트 (2026)"
  last_updated: "2026-04-16"
  description: "교량 수량집계표 자동화를 위한 용어 정규화 사전"

# ----------------------------------------------------------------
# 1. 단위 정규화 (Unit Normalization)
# ----------------------------------------------------------------
# 모든 단위를 표준 표기(standard)로 통일
# 비교 시 소문자 + 공백제거 비교 권장
units:
  "m3":
    aliases: ["m³", "㎥", "M³", "M3", "m3", "CM", "C.M", "C.M.", "cbm", "입방미터", "세제곱미터"]
    description: "체적 (콘크리트, 토공 등)"
    dimension: "volume"

  "m2":
    aliases: ["m²", "㎡", "M²", "M2", "m2", "SM", "S.M", "S.M.", "제곱미터", "평방미터"]
    description: "면적 (거푸집, 포장, 방수 등)"
    dimension: "area"

  "m":
    aliases: ["m", "M", "미터"]
    description: "길이"
    dimension: "length"

  "ton":
    aliases: ["ton", "TON", "Ton", "t", "T", "톤", "tonf"]
    description: "중량 (철근, 시멘트)"
    dimension: "weight"

  "kg":
    aliases: ["kg", "KG", "Kg", "킬로그램"]
    description: "중량 (소량 자재)"
    dimension: "weight"

  "EA":
    aliases: ["EA", "ea", "Ea", "개", "NR", "nr", "Nr"]
    description: "개수"
    dimension: "count"

  "본":
    aliases: ["본", "BN", "bn"]
    description: "개수 (말뚝, 버팀보 등)"
    dimension: "count"

  "개소":
    aliases: ["개소", "ㄱㅅ", "LOC"]
    description: "위치/지점 수"
    dimension: "count"

  "회":
    aliases: ["회", "TIMES", "times"]
    description: "작업 반복 횟수 (조립/해체, 시험 등)"
    dimension: "count"

  "hr":
    aliases: ["hr", "HR", "Hr", "시간", "시"]
    description: "시간 (물푸기 등)"
    dimension: "time"

  "포대":
    aliases: ["포대", "포", "BAG", "bag"]
    description: "시멘트 포대"
    dimension: "count"

  "식":
    aliases: ["식", "SET", "set"]
    description: "일식 (설계/계산 단위)"
    dimension: "lump_sum"

# ----------------------------------------------------------------
# 2. 총괄집계 대분류 (Top-level Categories)
# ----------------------------------------------------------------
# 출력 00 총괄집계표의 시트 구조에 대응
categories:
  - id: "earthwork"
    name: "토공"
    output_sheet: "토공총괄집계표"
    source_files: ["02_토공수량", "03_가축도공"]
    description: "터파기, 되메우기, 뒷채움, 유용토 등"

  - id: "structure"
    name: "구조물공"
    output_sheet: "구조물공총괄집계표"
    source_files: ["01_일반수량"]
    description: "콘크리트, 거푸집, 동바리 등 본체 시공 관련"

  - id: "rebar"
    name: "철근"
    output_sheet: "철근총괄"
    source_files: ["01_일반수량"]
    description: "철근 규격별 수량 (NET/ADD)"

  - id: "temp_structure"
    name: "가시설공"
    output_sheet: null  # 총괄집계표에 별도 시트 없음, 내역서로 통합
    source_files: ["04_가시설공"]
    description: "H-PILE, SHEET PILE, 버팀보 등 가설 흙막이"

  - id: "ground_improvement"
    name: "지반개량공"
    output_sheet: null  # 내역서로 통합
    source_files: ["05_지반개량"]
    description: "D.C.M, 심층혼합처리 등"

  - id: "temp_road"
    name: "가축도공"
    output_sheet: null  # 토공총괄에 '가축도' 컬럼으로 통합
    source_files: ["03_가축도공"]
    description: "임시 가설 도로"

  - id: "material"
    name: "자재"
    output_sheet: "주요자재"
    source_files: ["*"]  # 모든 파일에서 집계
    description: "철근/레미콘/시멘트/골재 등 자재별 집계"

