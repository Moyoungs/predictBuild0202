# ----------------------------------------------------------------
# 4. 철근 규격 정규화
# ----------------------------------------------------------------
# 한국 표준: SD400(일반) = D시리즈, SD400HR/고강도 = H시리즈
# 실제 데이터는 H 표기 우세 (갈전7교 프로젝트 전체 H 사용)
rebar_specs:
  prefixes:
    "H":
      description: "고강도 이형철근 (SD400 등)"
      aliases: ["H", "HD"]
    "D":
      description: "일반 이형철근"
      aliases: ["D", "SD"]

  # 지름(mm) 목록 (H/D 공통)
  diameters: [10, 13, 16, 19, 22, 25, 29, 32, 35, 38, 41, 51]

  # 표준 표기 규칙: {prefix}{diameter}  예: H25, D13
  normalize_pattern: "^([HD])D?(10|13|16|19|22|25|29|32|35|38|41|51)$"

  unit: "ton"

# ----------------------------------------------------------------
# 5. 콘크리트 규격 정규화
# ----------------------------------------------------------------
# 한국 레미콘 표준 표기: {굵은골재최대치수}-{설계기준강도}-{슬럼프}
# 예: 25-27-150  (굵은골재 25mm, fck=27MPa, 슬럼프 150mm)
concrete_specs:
  standard_pattern: "^(\\d+)-(\\d+)-(\\d+)$"
  slump_variants:
    # 슬럼프 표기 유의: 15 = 150mm, 80 = 80mm (세자리 표기가 현대 표준)
    # 실제 데이터에서 "25-35-15"와 "25-35-150" 둘 다 등장
    #   → 2자리면 x10 처리하여 150으로 통일
    two_digit_to_three:
      "15": "150"
      "12": "120"
      "10": "100"
      "8": "80"

  # 실제 등장 규격 (갈전7교)
  known_mixes:
    - "25-35-150"   # 본체 콘크리트 (fck=35, S=150)
    - "25-27-150"   # 기초 콘크리트 (fck=27, S=150)
    - "25-18-150"   # 버림콘크리트
    - "25-16-150"
    - "25-24-150"
    - "25-35-80"
    - "19-27-15"

  # 할증률 (주요자재 집계 시 적용)
  markup_rates:
    "25-35-150": 0.01   # 1% 할증
    "25-27-150": 0.01
    "25-18-150": 0.02   # 2% 할증 (무근)
    default: 0.01

# ----------------------------------------------------------------
# 6. 구조물 구분 (Structure Column Mapping)
# ----------------------------------------------------------------
# 입력 파일의 구조물 컬럼 ↔ 출력 총괄집계표 컬럼
# ※ 프로젝트마다 달라질 수 있으므로 project_config.yaml로도 오버라이드 가능
structures:
  - standard: "본교"
    aliases: ["본체", "교량", "갈전7교", "본교", "수  량", "수        량", "수 량", "수량"]
    output_column: "갈전7교"
    description: "주교량 본체"

  - standard: "방호벽"
    aliases: ["방호벽", "방호울타리"]
    output_column: null   # 구조물공 총괄에서 본교에 합산
    aggregate_into: "본교"

  - standard: "접속슬래브"
    aliases: ["접속슬래브", "Approach Slab", "접근슬래브"]
    output_column: null
    aggregate_into: "본교"

  - standard: "옹벽"
    aliases: ["옹벽", "옹벽공", "Retaining Wall"]
    output_column: "옹벽"

  - standard: "가축도"
    aliases: ["가축도", "가축도공", "가설도로"]
    output_column: "가축도"

  - standard: "시점측"
    aliases: ["시점측", "시점", "STA 시점"]
    output_column: null   # 토공에서 본교로 합산 (입력 02번의 시점/종점)
    aggregate_into: "본교"

  - standard: "종점측"
    aliases: ["종점측", "종점", "STA 종점"]
    output_column: null
    aggregate_into: "본교"

# ----------------------------------------------------------------
# 7. 집계 행(소계/합계) 식별 키워드
# ----------------------------------------------------------------
# 이 키워드가 포함된 행은 데이터 행이 아닌 집계 행으로 처리 (제외)
aggregate_row_keywords:
  - "계"
  - "소계"
  - "합계"
  - "총계"
  - "TOTAL"
  - "Total"
  - "total"
  - "SUB TOTAL"
  - "Sub Total"
  - "소    계"   # 공백 포함 변형
  - "합    계"
  - "철     근     계"
  - "철근 계"
  - "할증 계"

# ----------------------------------------------------------------
# 8. 시트명 분류 키워드 (집계표 vs 산출근거 vs 간지)
# ----------------------------------------------------------------
sheet_classification:
  aggregate_sheet:   # 이 키워드가 포함된 시트가 파싱 대상
    priority: 1
    keywords: ["집계표", "집계", "총괄", "수량집계"]
    # 우선순위 규칙: 같은 파일에 여러 집계표가 있을 때
    # '교량 일반수량 집계표' 같은 전체 집계표가 우선 → 구조물별 세부 집계표는 제외
    prefer_patterns:
      # 이 패턴이 매칭되면 전체 집계표로 간주 (우선 선택)
      - "교량 일반수량 집계표"
      - "교량 철근수량 집계표"
      - "토공 집계표"
      - "가축도집계"
      - "가시설 수량 집계표"
      - "가시설 자재 집계표"
      - "수량집계표"
    # 이 키워드가 포함되면 '부분' 집계표 → 전체 집계표가 있으면 스킵
    partial_keywords:
      - "본체"
      - "방호벽"
      - "접속슬래브"

  calculation_sheet:  # 산출 근거 (참고용, MVP에서는 스킵)
    priority: 2
    keywords: ["산출근거", "산출서", "근거", "산출"]

  cover_sheet:        # 표지/간지 (무시)
    priority: 3
    keywords: ["간지", "표지", "소간지", "표제"]

  ignore:             # 완전 무시
    keywords: ["Sheet1", "Sheet2", "Sheet3"]

# ----------------------------------------------------------------
# 9. 빈 값 표기 (Empty Value Representations)
# ----------------------------------------------------------------
empty_values:
  - "-"
  - "- "
  - " -"
  - "0"
  - "0.0"
  - ""
  - null
  - "N/A"
  - "해당없음"

# ----------------------------------------------------------------
# 10. AI 판단이 필요한 케이스 (Fallback Triggers)
# ----------------------------------------------------------------
# 아래 케이스에 해당하면 규칙 기반 처리 실패 → Claude API 호출
ai_fallback_triggers:
  - "사전에 없는 공종명"
  - "사전에 없는 단위"
  - "복수 카테고리에 매칭되는 모호한 항목"
  - "규격 문자열 파싱 실패 (콘크리트/철근)"
  - "헤더 행/데이터 행 구분 실패"
